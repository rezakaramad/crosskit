name: Validate Modules

on:
  pull_request:
    paths:
      - 'modules/**'
      - '.golangci.yml'

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.changed.outputs.modules }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed modules
        id: changed
        run: |
          changed_files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          modules=$(echo "$changed_files" \
            | grep -E '^modules/[^/]+/' \
            | cut -d/ -f2 \
            | sort -u \
            | jq -Rcn '[inputs | select(length>0)]' || echo '[]')
          echo "modules=${modules}" >> "$GITHUB_OUTPUT"
          echo "Changed modules: ${modules}"

  validate:
    name: Validate ${{ matrix.module }}
    needs: detect-changes
    if: needs.detect-changes.outputs.modules != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect-changes.outputs.modules) }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: modules/${{ matrix.module }}/go.mod
          cache-dependency-path: modules/${{ matrix.module }}/go.sum

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Validate ${{ matrix.module }}
        run: ./hack/validate-modules.sh ${{ matrix.module }}
